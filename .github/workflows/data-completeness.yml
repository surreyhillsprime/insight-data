name: INSIGHT Data Completeness

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify published private-estate asset
        run: |
          python3 scripts/build_private_estates_asset.py
          git diff --exit-code -- outputs/private-estates.js
      - name: Check shared feed coverage
        run: python3 scripts/check_data_completeness.py --strict-metadata
      - name: Verify schema publication contract
        run: python3 -m unittest discover -s tests -v
