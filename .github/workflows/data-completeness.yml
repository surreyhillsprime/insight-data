name: INSIGHT Data Completeness

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check shared feed coverage
        run: python3 scripts/check_data_completeness.py --strict-metadata
