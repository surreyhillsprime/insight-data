name: Monthly INSIGHT Property Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: write

concurrency:
  group: insight-data-refresh
  cancel-in-progress: false

jobs:
  monthly-property-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Synchronise latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Run Land Registry sweeper
        run: python3 scripts/sweep_land_registry.py

      - name: Enrich with EPC floor areas
        env:
          EPC_BEARER_TOKEN: ${{ secrets.EPC_BEARER_TOKEN }}
        run: |
          if [ -z "$EPC_BEARER_TOKEN" ]; then
            echo "::error::No EPC_BEARER_TOKEN secret configured. Add the GOV.UK EPC bearer token in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          python3 scripts/enrich_epc_data.py \
            --refresh-days 30 \
            --fail-under-matches 1 \
            --fail-if-no-matches-after 150 \
            --max-run-minutes 330 \
            --max-errors 150 \
            --request-timeout 15 \
            --request-retries 6 \
            --max-certificate-fetches 3 \
            --pause 1.25 \
            --allow-partial-success \
            --progress-every 25

      - name: Refresh monthly flood and amenity context
        run: |
          python3 scripts/enrich_property_context.py \
            --pause 0.15 \
            --progress-every 25 \
            --max-source-errors 25

      - name: Commit updated data
        run: |
          git config user.name "INSIGHT data bot"
          git config user.email "insight-data-bot@users.noreply.github.com"
          git pull --rebase --autostash origin main
          if git diff --name-only --diff-filter=U | grep -q . || grep -Eq '^(<<<<<<< |=======|>>>>>>> )' outputs/surrey-transactions.js; then
            echo "::error::Refresh produced Git conflicts; refusing to commit."
            exit 1
          fi
          PYTHONPATH=scripts python3 -c 'from pathlib import Path; from insight_data_utils import read_js; p=Path("outputs/surrey-transactions.js"); t=p.read_text(); rows,summary,meta=read_js(p); assert t.count("window.SURREY_LAND_REG_")==3 and rows and isinstance(summary,dict) and meta.get("schemaVersion")==2'
          git add outputs/surrey-transactions.js work/land-reg-surrey-3m-2010.csv
          if [ -f work/epc-cache.json ]; then
            git add work/epc-cache.json
          fi
          if [ -f work/property-context-cache.json ]; then
            git add work/property-context-cache.json
          fi
          if git diff --cached --quiet; then
            echo "No monthly INSIGHT changes to commit."
          else
            git commit -m "Update INSIGHT monthly property data"
            git push
          fi
