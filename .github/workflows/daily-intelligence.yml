name: Daily INSIGHT Intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

concurrency:
  group: insight-data-refresh
  cancel-in-progress: false

jobs:
  daily-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Synchronise latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Restore operational planning-query cache
        uses: actions/cache/restore@v4
        with:
          path: work/daily-intelligence-cache.json
          key: daily-intelligence-v2-${{ github.run_id }}
          restore-keys: daily-intelligence-v2-

      - name: Refresh current Environment Agency flood status
        run: |
          python3 scripts/enrich_property_context.py \
            --missing-only \
            --disable-osm \
            --pause 0.05 \
            --progress-every 25 \
            --max-source-errors 25

      - name: Refresh daily planning intelligence
        run: |
          python3 scripts/enrich_daily_intelligence.py \
            --planning-days 45 \
            --planning-radius-m 1200 \
            --disable-companies-house \
            --pause 0.15 \
            --progress-every 25 \
            --max-source-errors 25

      - name: Check data completeness
        run: python3 scripts/check_data_completeness.py

      - name: Save operational planning-query cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: work/daily-intelligence-cache.json
          key: daily-intelligence-v2-${{ github.run_id }}

      - name: Commit updated data
        run: |
          git config user.name "INSIGHT data bot"
          git config user.email "insight-data-bot@users.noreply.github.com"
          git pull --rebase --autostash origin main
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "::error::Refresh produced unresolved Git conflicts; refusing to commit."
            exit 1
          fi
          if grep -Eq '^(<<<<<<< |=======|>>>>>>> )' outputs/surrey-transactions.js; then
            echo "::error::Feed contains Git conflict markers; refusing to commit."
            exit 1
          fi
          PYTHONPATH=scripts python3 - <<'PY'
          from pathlib import Path
          from insight_data_utils import read_js

          path = Path("outputs/surrey-transactions.js")
          text = path.read_text(encoding="utf-8")
          transactions, summary, meta = read_js(path)
          assert text.count("window.SURREY_LAND_REG_") == 3, "feed must contain exactly three assignments"
          assert transactions and isinstance(summary, dict), "feed data is incomplete"
          assert meta.get("schemaVersion") == 3, "feed schemaVersion must be 3"
          assert meta.get("propertyRecordSchemaVersion") == 1, "property identity schema must be 1"
          assert all(str(item.get("propertyRecordId", "")).startswith("property:") for item in transactions), "every row needs a canonical property ID"
          PY
          git add outputs/surrey-transactions.js
          if git diff --cached --quiet; then
            echo "No daily INSIGHT changes to commit."
          else
            git commit -m "Update INSIGHT daily intelligence"
            git push
          fi
