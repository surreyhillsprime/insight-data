name: Legacy Manual INSIGHT Sweep

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: insight-data-refresh
  cancel-in-progress: false

jobs:
  update-insight-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Synchronise latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Build audited private-estate registry
        run: python3 scripts/build_private_estates_asset.py

      - name: Run Land Registry sweeper
        run: python3 scripts/sweep_land_registry.py

      - name: Restore encrypted EPC lookup cache
        uses: actions/cache/restore@v4
        with:
          path: work/epc-cache.json.enc
          key: epc-v3-encrypted-${{ github.run_id }}
          restore-keys: epc-v3-encrypted-

      - name: Decrypt EPC lookup cache on the runner
        env:
          EPC_BEARER_TOKEN: ${{ secrets.EPC_BEARER_TOKEN }}
        run: |
          if [ -f work/epc-cache.json.enc ]; then
            if printf '%s' "$EPC_BEARER_TOKEN" | openssl enc -d -aes-256-cbc -pbkdf2 -pass stdin -in work/epc-cache.json.enc -out work/epc-cache.json.tmp; then
              mv work/epc-cache.json.tmp work/epc-cache.json
            else
              rm -f work/epc-cache.json.tmp work/epc-cache.json
              echo "::warning::Encrypted EPC cache could not be decrypted; starting a fresh cache."
            fi
          fi

      - name: Enrich with EPC floor areas
        env:
          EPC_BEARER_TOKEN: ${{ secrets.EPC_BEARER_TOKEN }}
        run: |
          if [ -z "$EPC_BEARER_TOKEN" ]; then
            echo "::error::No EPC_BEARER_TOKEN secret configured. Add the GOV.UK EPC bearer token in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          python3 scripts/enrich_epc_data.py \
            --refresh-days 0 \
            --fail-under-matches 1 \
            --fail-if-no-matches-after 150 \
            --max-run-minutes 105 \
            --max-errors 75 \
            --request-timeout 15 \
            --request-retries 6 \
            --max-certificate-fetches 3 \
            --pause 0.75 \
            --allow-partial-success \
            --progress-every 25

      - name: Encrypt EPC lookup cache off-repository
        if: always()
        env:
          EPC_BEARER_TOKEN: ${{ secrets.EPC_BEARER_TOKEN }}
        run: |
          if [ -f work/epc-cache.json ] && [ -n "$EPC_BEARER_TOKEN" ]; then
            printf '%s' "$EPC_BEARER_TOKEN" | openssl enc -aes-256-cbc -salt -pbkdf2 -pass stdin -in work/epc-cache.json -out work/epc-cache.json.enc
            rm -f work/epc-cache.json
          fi

      - name: Save encrypted EPC lookup cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: work/epc-cache.json.enc
          key: epc-v3-encrypted-${{ github.run_id }}

      - name: Enrich with optional property context
        run: |
          python3 scripts/enrich_property_context.py \
            --missing-only \
            --disable-osm \
            --pause 0.15 \
            --progress-every 25 \
            --max-source-errors 20

      - name: Check complete estate-aware feed
        run: python3 scripts/check_data_completeness.py --strict-metadata

      - name: Commit updated data
        run: |
          git config user.name "INSIGHT data bot"
          git config user.email "insight-data-bot@users.noreply.github.com"
          git pull --rebase --autostash origin main
          if git diff --name-only --diff-filter=U | grep -q . || grep -Eq '^(<<<<<<< |=======|>>>>>>> )' outputs/surrey-transactions.js; then
            echo "::error::Refresh produced Git conflicts; refusing to commit."
            exit 1
          fi
          PYTHONPATH=scripts python3 -c 'from pathlib import Path; from insight_data_utils import read_js; p=Path("outputs/surrey-transactions.js"); t=p.read_text(); rows,summary,meta=read_js(p); assert t.count("window.SURREY_LAND_REG_")==3 and rows and isinstance(summary,dict) and meta.get("schemaVersion")==3 and meta.get("propertyRecordSchemaVersion")==1 and all(str(row.get("propertyRecordId", "")).startswith("property:") for row in rows)'
          git add outputs/surrey-transactions.js outputs/private-estates.js work/land-reg-surrey-3m-1995.csv work/land-reg-surrey-3m-1995-2009.csv work/land-reg-surrey-3m-2010.csv
          if git diff --cached --quiet; then
            echo "No INSIGHT data changes to commit."
          else
            git commit -m "Update INSIGHT property data"
            git push
          fi
