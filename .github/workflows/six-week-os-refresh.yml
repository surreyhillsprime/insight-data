name: Six Week INSIGHT OS Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "20 6 * * 0"

permissions:
  contents: write

concurrency:
  group: insight-data-refresh
  cancel-in-progress: false

jobs:
  six-week-os-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check six-week cadence
        id: cadence
        if: github.event_name != 'workflow_dispatch'
        run: |
          WEEK=$(date -u +%V)
          if [ $((10#$WEEK % 6)) -ne 0 ]; then
            echo "This is ISO week $WEEK, not a six-week refresh week. Skipping."
            echo "run_refresh=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_refresh=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: github.event_name == 'workflow_dispatch' || steps.cadence.outputs.run_refresh == 'true'
        uses: actions/checkout@v4

      - name: Synchronise latest main
        if: github.event_name == 'workflow_dispatch' || steps.cadence.outputs.run_refresh == 'true'
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Install coordinate transformer
        if: github.event_name == 'workflow_dispatch' || steps.cadence.outputs.run_refresh == 'true'
        run: python3 -m pip install --user pyproj

      - name: Refresh OS UPRN matching
        if: github.event_name == 'workflow_dispatch' || steps.cadence.outputs.run_refresh == 'true'
        env:
          OS_OPEN_UPRN_CSV_URL: ${{ secrets.OS_OPEN_UPRN_CSV_URL }}
        run: |
          python3 scripts/enrich_os_uprn.py \
            --max-match-distance-m 150 \
            --progress-every 25

      - name: Check data completeness
        if: github.event_name == 'workflow_dispatch' || steps.cadence.outputs.run_refresh == 'true'
        run: python3 scripts/check_data_completeness.py

      - name: Commit updated data
        if: github.event_name == 'workflow_dispatch' || steps.cadence.outputs.run_refresh == 'true'
        run: |
          git config user.name "INSIGHT data bot"
          git config user.email "insight-data-bot@users.noreply.github.com"
          git pull --rebase --autostash origin main
          if git diff --name-only --diff-filter=U | grep -q . || grep -Eq '^(<<<<<<< |=======|>>>>>>> )' outputs/surrey-transactions.js; then
            echo "::error::Refresh produced Git conflicts; refusing to commit."
            exit 1
          fi
          PYTHONPATH=scripts python3 -c 'from pathlib import Path; from insight_data_utils import read_js; p=Path("outputs/surrey-transactions.js"); t=p.read_text(); rows,summary,meta=read_js(p); assert t.count("window.SURREY_LAND_REG_")==3 and rows and isinstance(summary,dict) and meta.get("schemaVersion")==3 and meta.get("propertyRecordSchemaVersion")==1 and all(str(row.get("propertyRecordId", "")).startswith("property:") for row in rows)'
          git add outputs/surrey-transactions.js
          if [ -f work/os-uprn-cache.json ]; then
            git add work/os-uprn-cache.json
          fi
          if [ -f work/os-open-uprn-surrey.csv ]; then
            git add work/os-open-uprn-surrey.csv
          fi
          if git diff --cached --quiet; then
            echo "No OS INSIGHT changes to commit."
          else
            git commit -m "Update INSIGHT OS UPRN matches"
            git push
          fi
